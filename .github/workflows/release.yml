name: Build forgejo for Debian/Ubuntu

on:
  workflow_dispatch:
    inputs:
      FORGEJO_VERSION:
        description: The version of forgejo to build.
        type: string
        required: true
      build_version:
        description: The build version.
        type: string
        required: true
      architecture:
        description: Architecture to build (amd64, armhf, arm64, or 'all' for all architectures)
        type: choice
        default: 'all'
        options:
          - 'all'
          - 'amd64'
          - 'armhf'
          - 'arm64'

permissions:
  contents: write

jobs:
  build-forgejo:
    name: Build Binary Packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout forgejo-debian
        uses: actions/checkout@v4

      - name: Build forgejo
        run: ./build.sh ${{ inputs.FORGEJO_VERSION }} ${{ inputs.build_version }} ${{ inputs.architecture }}

      - name: Upload Binary Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binary-artifact
          path: forgejo_*.deb

  build-src:
    name: Build Source Packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout forgejo-debian
        uses: actions/checkout@v4

      - name: Install dpkg-dev
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends dpkg-dev devscripts wget ca-certificates

      - name: Build source packages
        run: ./build_src.sh ${{ inputs.FORGEJO_VERSION }} ${{ inputs.build_version }}

      - name: Upload Source Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: source-artifact
          path: |
            forgejo_*.dsc
            forgejo_*.orig.tar.gz
            forgejo_*.debian.tar.xz

  release-forgejo:
    name: Release forgejo for Debian/Ubuntu
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [build-forgejo, build-src]
    steps:
      - name: Download Binary Artifacts
        uses: actions/download-artifact@v4
        with:
          name: binary-artifact

      - name: Download Source Artifacts
        uses: actions/download-artifact@v4
        with:
          name: source-artifact

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          files: |
            forgejo_*.deb
            forgejo_*.dsc
            forgejo_*.orig.tar.gz
            forgejo_*.debian.tar.xz
          name: ${{ inputs.FORGEJO_VERSION }}+${{ inputs.build_version }}
          tag_name: ${{ inputs.FORGEJO_VERSION }}+${{ inputs.build_version }}
          fail_on_unmatched_files: true
